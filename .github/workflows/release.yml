name: Release Addon

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release package
        shell: pwsh
        run: ./tools/release.ps1 -Version "${{ github.ref_name }}" -Ci

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: GearScore2-${{ github.ref_name }}
          path: dist/GearScore2-${{ github.ref_name }}.zip

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          "dist/GearScore2-${{ github.ref_name }}.zip"
          --title "${{ github.ref_name }}"
          --notes-file "dist/release-notes-${{ github.ref_name }}.md"
